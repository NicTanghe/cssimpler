<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 160" width="100%" height="100%">
  <defs>
    <linearGradient id="rust" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E24D28" />
      <stop offset="100%" stop-color="#A52A11" />
    </linearGradient>

    <linearGradient id="windowBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1E1E" />
      <stop offset="100%" stop-color="#121212" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#E24D28" flood-opacity="0.3" />
    </filter>

    <filter id="boxShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>

  <g transform="translate(30, 30)" filter="url(#boxShadow)">
    <rect x="0" y="0" width="110" height="100" rx="14" fill="url(#windowBg)" stroke="#333333"
      stroke-width="1" />

    <circle cx="16" cy="16" r="4" fill="#FF5F56" />
    <circle cx="28" cy="16" r="4" fill="#FFBD2E" />
    <circle cx="40" cy="16" r="4" fill="#27C93F" />

    <rect x="0" y="28" width="110" height="1" fill="#333333" />

    <rect x="16" y="38" width="78" height="52" rx="4" fill="none" stroke="#444444" stroke-width="1"
      stroke-dasharray="2 2" />
    <rect x="22" y="44" width="66" height="40" rx="2" fill="none" stroke="#2A2A2A" stroke-width="1" />

    <g stroke="url(#rust)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"
      fill="none" filter="url(#glow)">
      <path
        d="M 40 46 C 32 46, 32 52, 32 55 C 32 60, 24 64, 24 66 C 24 68, 32 72, 32 77 C 32 80, 32 86, 40 86" />
      <path
        d="M 70 46 C 78 46, 78 52, 78 55 C 78 60, 86 64, 86 66 C 86 68, 78 72, 78 77 C 78 80, 78 86, 70 86" />
    </g>

    <rect x="42" y="56" width="26" height="4" rx="2" fill="#666666" />
    <rect x="42" y="66" width="16" height="4" rx="2" fill="#555555" />
    <circle cx="64" cy="68" r="2" fill="#888888" />
  </g>

  <g transform="translate(170, 96)">
    <text
      font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
      font-size="56" font-weight="800" fill="#1A1A1A" letter-spacing="-1.5"> css<tspan
        fill="url(#rust)">impler</tspan>
    </text>

    <text x="4" y="26"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
      font-size="13" font-weight="700" fill="#888888" letter-spacing="4">
      RUST UI FRAMEWORK
    </text>
  </g>
</svg>

